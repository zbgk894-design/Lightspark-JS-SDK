          type: string
          enum:
            - OAUTH
          description: Discriminator value identifying this as an OAuth credential.
        oidcToken:
          type: string
          description: OIDC ID token issued by the identity provider (e.g. Google, Apple). The token's `iss`, `aud`, and `sub` claims define the OAuth identity registered to this credential. In production, the provider signature is verified against the issuer's JWKS. In sandbox, the token must still be JWT-shaped with supported `iss`, non-empty `aud` and `sub`, numeric `iat` and `exp`, and `iat` less than 60 seconds before the request timestamp, but the signature segment may be a dummy value.
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.-3_ETmSGOl4wGNLR1QSOMlHk5IvADpX3YdHFmTH9KmRu6sEhM20RsURjKrI4-_EKj7J_HtsdS1tCHm0iw2J0qtoczYFQqEW_U9qJD6QsuvTFx8Fj9rFa3ieYhZKi3kkBu6cADogUiudP50kf9345ATys2GrYm-ba5esgReW1WzGJG3SgCyIDnHFfxmeLjE2YE9EFxT73To3mPYAk0ywPL2MpFFV9F8I3PsnbDAxinaY75GeA8vJXATr8weEIXqHD2lxmXVE95qd2ZlcuyLUaEYyp9GXcOnx7SjhdJG88jl5BZQvxOVgBMo42iGjK674lSwsMiHpzLX98j6C786Rd9Q
    OauthCredentialCreateRequest:
      title: OAuth Credential Create Request
      allOf:
        - $ref: '#/components/schemas/AuthCredentialCreateRequest'
        - $ref: '#/components/schemas/OauthCredentialCreateRequestFields'
    PasskeyAttestation:
      title: Passkey Attestation
      type: object
      required:
        - credentialId
        - clientDataJson
        - attestationObject
      properties:
        credentialId:
          type: string
          description: Base64url-encoded credential identifier produced by the authenticator at registration time. Typically the base64url of `PublicKeyCredential.rawId`.
          example: AdKXJEch1aV5Wo7bj7qLHskVY4OoNaj9qu8TPdJ7kSAgUeRxWNngXlcNIGt4gexZGKVGcqZpqqWordXb_he1izY
        clientDataJson:
          type: string
          description: 'Base64url-encoded JSON client data collected by the browser during the WebAuthn `navigator.credentials.create()` call. Corresponds to `AuthenticatorAttestationResponse.clientDataJSON` from the WebAuthn spec — Grid''s field name is intentionally camelCased as `clientDataJson` (lowercase JSON) for consistency with the rest of the API; the value is the same bytes the browser returns. Contains the challenge, origin, and `type: "webauthn.create"`.'
          example: eyJjaGFsbGVuZ2UiOiJBcktRaTJ5QVlIUGxnbkpORkJsbmVJd2NoUWRXWEJPVHJkQi1BbU1VQjIxTHgiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uY3JlYXRlIn0
        attestationObject:
          type: string
          description: Base64url-encoded CBOR attestation object produced by the authenticator during registration. Corresponds to `AuthenticatorAttestationResponse.attestationObject`.
          example: o2NmbXRkbm9uZWdhdHRTdG10oGhhdXRoRGF0YVjFPdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KBFAAAAAAAAAAAAAAAAAAAAAAAAAAAAQQHSlyRHIdWleVqO24-6ix7JFWODqDWo_arvEz3Se5EgIFHkcVjZ4F5XDSBreIHsWRilRnKmaaqlqK3V2_4XtYs2pQECAyYgASFYID5PQTZQQg6haZFQWFzqfAOyQ_ENsMH8xxQ4GRiNPsqrIlggU8IVUOV8qpgk_Jh-OTaLuZL52KdX1fTht07X4DiQPow
        transports:
          type: array
          items:
            type: string
            enum:
              - usb
              - nfc
              - ble
              - internal
              - hybrid
          description: Optional. WebAuthn transports as returned by `AuthenticatorAttestationResponse.getTransports()`. Values follow the W3C `AuthenticatorTransport` enum — pass the raw values through to Grid; provider-specific translation is handled server-side. Some authenticators return an empty array; omit the field or send `[]` in that case.
          example:
            - internal
            - hybrid
    PasskeyCredentialCreateRequestFields:
      type: object
      required:
        - type
        - nickname
        - challenge
        - attestation
      properties:
        type:
          type: string
          enum:
            - PASSKEY
          description: Discriminator value identifying this as a passkey credential.
        nickname:
          type: string
          description: 'Human-readable identifier for the passkey, chosen by the user at registration time (e.g. "iPhone Face-ID", "YubiKey 5C"). Leading and trailing whitespace is ignored. Must be 1-100 characters and may contain Unicode letters, numbers, spaces, and the following separators: period, underscore, hyphen, apostrophe, and parentheses. Shown back on AuthMethod responses and in credential listings.'
          example: iPhone Face-ID
        challenge:
          type: string
          description: Base64url-encoded WebAuthn challenge issued by the platform backend and passed to the client before `navigator.credentials.create()`. Grid verifies it matches the challenge embedded in the attestation's `clientDataJson`, binding the attestation to this registration. Must be single-use.
          example: ArkQi2yAYHPlgnJNFBlneIwchQdWXBOTrdB-AmMUB21Lx
        attestation:
          $ref: '#/components/schemas/PasskeyAttestation'
    PasskeyCredentialCreateRequest:
      title: Passkey Credential Create Request
      allOf:
        - $ref: '#/components/schemas/AuthCredentialCreateRequest'
        - $ref: '#/components/schemas/PasskeyCredentialCreateRequestFields'
    AuthCredentialCreateRequestOneOf:
      oneOf:
        - $ref: '#/components/schemas/EmailOtpCredentialCreateRequest'
        - $ref: '#/components/schemas/OauthCredentialCreateRequest'
        - $ref: '#/components/schemas/PasskeyCredentialCreateRequest'
      discriminator:
        propertyName: type
        mapping:
          EMAIL_OTP: '#/components/schemas/EmailOtpCredentialCreateRequest'
          OAUTH: '#/components/schemas/OauthCredentialCreateRequest'
          PASSKEY: '#/components/schemas/PasskeyCredentialCreateRequest'
    AuthMethodResponse:
      title: Auth Method Response
      description: |-
        Strict wrapper around `AuthMethod`. Used directly as the registration response on `POST /auth/credentials` (all three credential types) and inside `AuthCredentialResponseOneOf` for the `EMAIL_OTP` branch of `POST /auth/credentials/{id}/challenge`. The only difference from `AuthMethod` is `unevaluatedProperties: false`, which disambiguates the oneOf against `PasskeyAuthChallenge` — without the strictness, an `AuthMethod` with extra fields would ambiguously match both branches.

        For `EMAIL_OTP` credentials, responses that initiate or reissue an OTP challenge carry `otpEncryptionTargetBundle` so the client can HPKE-encrypt the OTP code in the subsequent `POST /auth/credentials/{id}/verify` call without the plaintext code ever transiting the server. First-time EMAIL_OTP wallet bootstrap registration can omit it; call `POST /auth/credentials/{id}/challenge` if it is absent.
      allOf:
        - $ref: '#/components/schemas/AuthMethod'
        - type: object
          properties:
            otpEncryptionTargetBundle:
              type: string
              description: HPKE encryption target bundle for a freshly initiated OTP challenge. Returned only on `EMAIL_OTP` responses that initiate or reissue an OTP challenge, such as `POST /auth/credentials/{id}/challenge` and the add-EMAIL_OTP signed-retry response. It is omitted from first-time EMAIL_OTP wallet bootstrap registration; call `POST /auth/credentials/{id}/challenge` for the new credential if it is absent. The client generates an ephemeral P-256 keypair (the Target Encryption Key, or TEK) and uses this bundle as the recipient when HPKE-encrypting `{otp_code, public_key}`; the encrypted payload is submitted as `encryptedOtpBundle` on `POST /auth/credentials/{id}/verify`. The bundle is one-time-use per OTP issuance — re-issue via `POST /auth/credentials/{id}/challenge` to obtain a fresh bundle. The matching TEK private key must remain on the client and is used to sign the `verificationToken` returned on the subsequent signed-retry. Treat the bundle as opaque and pass it to your HPKE library; the Global Accounts client-keys guide shows how.
              example: '{"version":"v1.0.0","data":"7b227461726765745075626c6963...","dataSignature":"30450221...","enclaveQuorumPublic":"04a1b2c3..."}'
      unevaluatedProperties: false
    AuthSignedRequestChallenge:
      title: Authentication Signed Request Challenge
      description: |-
        202 response returned from Embedded Wallet Auth endpoints that require a signed retry — `POST /auth/credentials` (adding an additional credential), `DELETE /auth/credentials/{id}` (revoking a credential), `DELETE /auth/sessions/{id}` (revoking a session), and the `EMAIL_OTP` branch of `POST /auth/credentials/{id}/verify` (the secure OTP login flow, where the client submits an `encryptedOtpBundle` and receives a `verificationToken` to sign for the second-leg session issuance). Carries the signing fields from `SignedRequestChallenge` plus the `type` of the authentication credential involved (being added, revoked, that issued the session being revoked, or being authenticated). The client already knows the target resource id from the request path / body it just sent, so nothing beyond `type` is echoed in the response.

        The keypair used to compute the stamp depends on the operation. For credential / session management retries, sign with the session API keypair of an existing verified credential on the same internal account. For the `EMAIL_OTP` verify retry, sign with the ephemeral Target Encryption Key (TEK) the client generated for this login — its public key is the one carried inside the `encryptedOtpBundle` and bound into the `verificationToken`, and it becomes the client's session API key on successful completion.
      allOf:
        - $ref: '#/components/schemas/SignedRequestChallenge'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/AuthMethodType'
              description: 'Credential type relevant to this challenge: the credential type being added (`POST /auth/credentials`), revoked (`DELETE /auth/credentials/{id}`), or authenticated (`EMAIL_OTP` branch of `POST /auth/credentials/{id}/verify`). For session revocation, this is the type of credential that issued the session (`DELETE /auth/sessions/{id}`).'
    AuthCredentialVerifyRequest:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/AuthMethodType'
    EmailOtpCredentialVerifyRequestFields:
      type: object
      required:
        - type
        - encryptedOtpBundle
      description: Verify an email-OTP credential via the secure two-leg flow. The client HPKE-encrypts the OTP code (together with its public key) under the `otpEncryptionTargetBundle` returned from registration when present, or from `POST /auth/credentials/{id}/challenge` when registration omitted it or the OTP must be reissued, submits the result here, and receives `202` with a `payloadToSign` carrying a `verificationToken` bound to the client's public key. The client signs that token with the matching private key and retries this request with `Grid-Wallet-Signature` + `Request-Id` headers to obtain the session. Plaintext OTP codes are never sent over the wire.
      properties:
        type:
          type: string
          enum:
            - EMAIL_OTP
          description: Discriminator value identifying this as an email OTP verification.
        encryptedOtpBundle:
          type: string
          description: |-
            HPKE-sealed OTP attempt — the OTP code never reaches Grid in plaintext. The client generates a fresh ephemeral P-256 key pair (the session signing key pair it keeps once login completes), HPKE-encrypts `{otp_code, public_key}` (the code the user entered plus that key pair's public key) to the key in `otpEncryptionTargetBundle`, and submits the encrypted result here. The value is the `{encappedPublic, ciphertext}` JSON an HPKE library produces; the Global Accounts client-keys guide has a worked example.

            On success the response is `202` with a `payloadToSign` carrying a `verificationToken` bound to the public key sealed in this bundle. Sign that token with the matching private key, then retry this request with the full stamp in `Grid-Wallet-Signature` and the `requestId` in `Request-Id` to complete the flow and receive the session. The client keeps that private key as the session signing key, and its public key becomes the session API key.
          example: '{"encappedPublic":"044f631a2d890bc6668d997ee184e190650d06adf970987568ec641214a00403b73effe1ef406c60a5cde8508a4484567ddb8056fbd493bee614cd727aef02a838","ciphertext":"1fa1023390a56539aa48cbb380aa28f544ed5cc04861566bb806e25ba026f14660eaf4140a05b388dd012eaa899759a6a92576cdca8c1b7d12e147bd96cc26ed9f74886794155d8ac5cf0fdc"}'
    EmailOtpCredentialVerifyRequest:
      title: Email OTP Credential Verify Request
      allOf:
        - $ref: '#/components/schemas/AuthCredentialVerifyRequest'
        - $ref: '#/components/schemas/EmailOtpCredentialVerifyRequestFields'
    OauthCredentialVerifyRequestFields:
      type: object
      required:
        - type
        - oidcToken
        - clientPublicKey
      properties:
        type:
          type: string
          enum:
            - OAUTH
          description: Discriminator value identifying this as an OAuth verification.
        oidcToken:
          type: string
          description: OIDC ID token issued by the identity provider. For reauthentication after a prior session expired, supply a fresh token — the token's `iat` claim must be less than 60 seconds before the request timestamp. The token identity (`iss`, `aud`, and `sub`) must match the registered OAuth credential. In production, the provider signature is verified against the issuer's JWKS. In sandbox, the token must still be JWT-shaped with supported `iss`, non-empty `aud` and `sub`, numeric `iat` and `exp`, and a `nonce` equal to `sha256(clientPublicKey)`, but the signature segment may be a dummy value.
          example: eyJhbGciOiJSUzI1NiIsImtpZCI6ImFiYzEyMyIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmdvb2dsZS5jb20iLCJzdWIiOiIxMTIyMzM0NDU1IiwiYXVkIjoiMTIzNDU2Ny5hcHBzLmdvb2dsZXVzZXJjb250ZW50LmNvbSIsImVtYWlsIjoidXNlckBleGFtcGxlLmNvbSIsImlhdCI6MTc0NjczNjUwOSwiZXhwIjoxNzQ2NzQwMTA5fQ.-3_ETmSGOl4wGNLR1QSOMlHk5IvADpX3YdHFmTH9KmRu6sEhM20RsURjKrI4-_EKj7J_HtsdS1tCHm0iw2J0qtoczYFQqEW_U9qJD6QsuvTFx8Fj9rFa3ieYhZKi3kkBu6cADogUiudP50kf9345ATys2GrYm-ba5esgReW1WzGJG3SgCyIDnHFfxmeLjE2YE9EFxT73To3mPYAk0ywPL2MpFFV9F8I3PsnbDAxinaY75GeA8vJXATr8weEIXqHD2lxmXVE95qd2ZlcuyLUaEYyp9GXcOnx7SjhdJG88jl5BZQvxOVgBMo42iGjK674lSwsMiHpzLX98j6C786Rd9Q
        clientPublicKey:
          type: string
          description: Client-generated P-256 public key, hex-encoded in uncompressed SEC1 format (0x04 prefix followed by the 32-byte X and 32-byte Y coordinates; 130 hex characters total). The matching private key must remain on the client. Grid encrypts the session signing key returned in the response to this public key. The key is ephemeral and one-time-use per verification request.
          example: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
    OauthCredentialVerifyRequest:
      title: OAuth Credential Verify Request
      allOf:
        - $ref: '#/components/schemas/AuthCredentialVerifyRequest'
        - $ref: '#/components/schemas/OauthCredentialVerifyRequestFields'
    PasskeyAssertion:
      title: Passkey Assertion
      type: object
      description: WebAuthn assertion returned by `navigator.credentials.get()`. In sandbox, Grid validates the assertion against the registered passkey credential so the client-side flow can match production. In production, Turnkey validates the WebAuthn assertion.
      required:
        - credentialId
        - clientDataJson
        - authenticatorData
        - signature
      properties:
        credentialId:
          type: string
          description: Base64url-encoded credential identifier returned during the WebAuthn assertion. Corresponds to `PublicKeyCredential.rawId`.
          example: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
        clientDataJson:
          type: string
          description: 'Base64url-encoded JSON client data collected by the browser during the WebAuthn `navigator.credentials.get()` call. Corresponds to `AuthenticatorAssertionResponse.clientDataJSON` from the WebAuthn spec — Grid''s field name is intentionally camelCased as `clientDataJson` (lowercase JSON) for consistency with the rest of the API; the value is the same bytes the browser returns. Contains the challenge, origin, and `type: "webauthn.get"`.'
          example: eyJjaGFsbGVuZ2UiOiJkRzkwWVd4c2VWVnVhWEYxWlZaaGJIVmxSWFpsY25sVWFXMWwiLCJjbGllbnRFeHRlbnNpb25zIjp7fSwiaGFzaEFsZ29yaXRobSI6IlNIQS0yNTYiLCJvcmlnaW4iOiJodHRwczovL2Rldi5kb250bmVlZGEucHciLCJ0eXBlIjoid2ViYXV0aG4uZ2V0In0
        authenticatorData:
          type: string
          description: Base64url-encoded authenticator data returned by the authenticator during the assertion. Corresponds to `AuthenticatorAssertionResponse.authenticatorData`.
          example: PdxHEOnAiLIp26idVjIguzn3Ipr_RlsKZWsa-5qK-KABAAAAkA
        signature:
          type: string
          description: Base64url-encoded signature produced by the authenticator over `authenticatorData || SHA-256(clientDataJSON)`. Corresponds to `AuthenticatorAssertionResponse.signature`. The signature byte format is determined by the credential's public-key algorithm — DER-encoded ECDSA for ES256 (P-256, typical for passkeys), PKCS#1 v1.5 for RS256, or a raw 64-byte signature for EdDSA.
          example: MEUCIQDYXBOpCWSWq2Ll4558GJKD2RoWg958lvJSB_GdeokxogIgWuEVQ7ee6AswQY0OsuQ6y8Ks6jhd45bDx92wjXKs900
        userHandle:
          type: string
          description: Base64url-encoded user handle returned by the authenticator. Corresponds to `AuthenticatorAssertionResponse.userHandle`. Populated (and required by the WebAuthn spec) for discoverable credentials — resident keys used in the "Sign in with passkey" autofill flow — and typically present for passkey registrations. Omit this field entirely for non-discoverable credentials specified via `allowCredentials` where the authenticator returns no user handle.
          example: dXNlci1oYW5kbGUtZXhhbXBsZQ
    PasskeyCredentialVerifyRequestFields:
      type: object
      required:
        - type
        - assertion
      properties:
        type:
          type: string
          enum:
            - PASSKEY
          description: Discriminator value identifying this as a passkey verification.
        assertion:
          $ref: '#/components/schemas/PasskeyAssertion'
    PasskeyCredentialVerifyRequest:
      title: Passkey Credential Verify Request
      allOf:
        - $ref: '#/components/schemas/AuthCredentialVerifyRequest'
        - $ref: '#/components/schemas/PasskeyCredentialVerifyRequestFields'
    AuthCredentialVerifyRequestOneOf:
      oneOf:
        - $ref: '#/components/schemas/EmailOtpCredentialVerifyRequest'
        - $ref: '#/components/schemas/OauthCredentialVerifyRequest'
        - $ref: '#/components/schemas/PasskeyCredentialVerifyRequest'
      discriminator:
        propertyName: type
        mapping:
          EMAIL_OTP: '#/components/schemas/EmailOtpCredentialVerifyRequest'
          OAUTH: '#/components/schemas/OauthCredentialVerifyRequest'
          PASSKEY: '#/components/schemas/PasskeyCredentialVerifyRequest'
    AuthSession:
      title: Authentication Session
      description: An authentication session on an Embedded Wallet internal account. Returned from `GET /auth/sessions` (list) and `POST /auth/credentials/{id}/verify` (on credential verification) or `POST /auth/sessions/{id}/refresh` (on mid-session refresh). Only session-issuing responses include `encryptedSessionSigningKey` — it is delivered exactly once at the moment the session is issued and is never returned by the list endpoint.
      allOf:
        - $ref: '#/components/schemas/AuthMethod'
        - type: object
          required:
            - id
            - expiresAt
          properties:
            id:
              type: string
              description: System-generated unique identifier for the session. Pass this value to `DELETE /auth/sessions/{id}` to revoke the session before `expiresAt`. Overrides the `id` inherited from `AuthMethod` so this response identifies the session rather than the authenticating credential.
              example: Session:019542f5-b3e7-1d02-0000-000000000003
            encryptedSessionSigningKey:
              type: string
              description: |-
                HPKE-encrypted session signing key, sealed to the `clientPublicKey` supplied on the verification or refresh request. Encoded as a base58check string: the decoded payload is a 33-byte compressed P-256 encapsulated public key followed by AES-256-GCM ciphertext. The client decrypts this key with its private key and uses it to sign subsequent Embedded Wallet requests until `expiresAt`.

                Returned only by session-issuing responses for `OAUTH` and `PASSKEY` credentials. `EMAIL_OTP` sessions omit this field — the client generates a TEK keypair before verification and retains the private key throughout, so the server has nothing to deliver. Always omitted from list responses (`GET /auth/sessions`) since Grid does not retain the plaintext key after the client has decrypted it.
              example: w99a5xV6A75TfoAUkZn869fVyDYvgVsKrawMALZXmrauZd8hEv66EkPU1Z42CUaHESQjcA5bqd8dynTGBMLWB9ewtXWPEVbZvocB4Tw2K1vQVp7uwjf
            expiresAt:
              type: string
              format: date-time
              description: Timestamp after which the session is no longer valid and the `encryptedSessionSigningKey` must not be used to sign further requests.
              example: '2026-04-09T15:30:01Z'
    Error429:
      type: object
      required:
        - message
        - status
        - code
      properties:
        status:
          type: integer
          enum:
            - 429
          description: HTTP status code
        code:
          type: string
          description: |
            | Error Code | Description |
            |------------|-------------|
            | RATE_LIMITED | Too many requests in a short window; retry after the interval indicated by the `Retry-After` response header |
          enum:
            - RATE_LIMITED
        message:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
          additionalProperties: true
    AuthCredentialChallengeRequest:
      title: Auth Credential Challenge Request
      description: Request body for `POST /auth/credentials/{id}/challenge`. Required when re-challenging a `PASSKEY` credential — must carry `clientPublicKey` so Grid can bake it into the Turnkey session-creation payload the returned challenge is computed from. Ignored for `EMAIL_OTP`, where the credential type alone is sufficient because the OTP is delivered out-of-band. OAuth credentials do not use this endpoint; authenticate or reauthenticate them with `POST /auth/credentials/{id}/verify`.
      type: object
      properties:
        clientPublicKey:
          type: string
          pattern: ^04[0-9a-fA-F]{128}$
          minLength: 130
          maxLength: 130
          description: Required for `PASSKEY` credentials. Client-generated P-256 public key, hex-encoded in uncompressed SEC1 format (`04` prefix followed by the 32-byte X and 32-byte Y coordinates; 130 hex characters total). The matching private key must remain on the client. Grid bakes this key into the Turnkey session-creation payload that the returned `challenge` is computed from, so the resulting session signing key is sealed to the client. Ignored for `EMAIL_OTP`.
          example: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
    PasskeyAuthChallenge:
      title: Passkey Auth Challenge
      description: Extended `AuthMethod` shape returned for `PASSKEY` credentials from `POST /auth/credentials/{id}/challenge`. Includes the WebAuthn `credentialId` needed to target the passkey, plus the Grid-issued `challenge`, corresponding `requestId`, and challenge `expiresAt`. The `challenge` value is the lowercase hex-encoded SHA-256 digest of the canonical Turnkey session-creation request body, not a base64url string. The client UTF-8 encodes this string as the WebAuthn challenge and signs it with the passkey to produce the assertion submitted to `POST /auth/credentials/{id}/verify`.
      allOf:
        - $ref: '#/components/schemas/AuthMethod'
        - type: object
          required:
            - credentialId
            - challenge
            - requestId
            - expiresAt
          properties:
            credentialId:
              type: string
              description: Base64url-encoded WebAuthn credential identifier for this passkey. Corresponds to `PublicKeyCredential.rawId`; pass this value as `allowCredentials[].id` when requesting a passkey assertion for this auth method.
              example: KEbWNCc7NgaYnUyrNeFGX9_3Y-8oJ3KwzjnaiD1d1LVTxR7v3CaKfCz2Vy_g_MHSh7yJ8yL0Pxg6jo_o0hYiew
            challenge:
              type: string
              description: Lowercase hex-encoded SHA-256 digest of the canonical Turnkey session-creation request body for the pending passkey authentication. Do not base64url-decode this field; pass UTF-8 bytes of the string (for example, `new TextEncoder().encode(challenge)`) as the WebAuthn challenge to `navigator.credentials.get()`. Single-use; a new challenge is issued on the next call to `POST /auth/credentials/{id}/challenge`.
              example: 6b35a4c41d9aa7a2a0e742f9f9e7a1c2d65a2db33a3fb748f6d4f1ce78d9a729
            requestId:
              type: string
              description: Grid-issued `Request:<uuid>` identifier for this pending passkey authentication request. Echo this value exactly as the `Request-Id` header on the subsequent `POST /auth/credentials/{id}/verify` call so Grid can correlate the assertion with the issued challenge.
              example: Request:7c4a8d09-ca37-4e3e-9e0d-8c2b3e9a1f21
            expiresAt:
              type: string
              format: date-time
              description: Timestamp after which the issued challenge is no longer valid. The assertion must reach `POST /auth/credentials/{id}/verify` before this time; otherwise the client must request a fresh challenge via `POST /auth/credentials/{id}/challenge`.
              example: '2026-04-08T15:35:00Z'
    AuthCredentialResponseOneOf:
      title: Auth Credential Response
      description: Discriminated response shape returned from `POST /auth/credentials/{id}/challenge`. For `EMAIL_OTP` credentials the body is a plain `AuthMethod` (wrapped as `AuthMethodResponse` to disambiguate the oneOf). For `PASSKEY` credentials the body is a `PasskeyAuthChallenge` — the passkey auth method fields plus the WebAuthn `credentialId`, Grid-issued `challenge`, `requestId`, and `expiresAt` that drive the subsequent assertion. OAuth credentials do not use the challenge endpoint. Registration responses from `POST /auth/credentials` use the simpler `AuthMethodResponse` shape directly for all three credential types.
      oneOf:
        - $ref: '#/components/schemas/AuthMethodResponse'
        - $ref: '#/components/schemas/PasskeyAuthChallenge'
      discriminator:
        propertyName: type
        mapping:
          EMAIL_OTP: '#/components/schemas/AuthMethodResponse'
          PASSKEY: '#/components/schemas/PasskeyAuthChallenge'
    SessionListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          description: List of active authentication sessions for the internal account.
          items:
            $ref: '#/components/schemas/AuthSession'
    AuthSessionRefreshRequest:
      title: Auth Session Refresh Request
      description: Request body for refreshing an active authentication session. The `clientPublicKey` is required on both steps of the signed-retry flow. On the initial call, Grid binds this key into the Turnkey session-creation payload returned as `payloadToSign`; on the signed retry, the client echoes the same key back and Grid uses it to encrypt the newly issued session signing key.
      type: object
      required:
        - clientPublicKey
      properties:
        clientPublicKey:
          type: string
          pattern: ^04[0-9a-fA-F]{128}$
          description: Client-generated P-256 public key, hex-encoded in uncompressed SEC1 format (`04` prefix followed by the 32-byte X and 32-byte Y coordinates; 130 hex characters total). The matching private key must remain on the client. Grid binds this key into the session-creation payload on the initial call and seals the returned `encryptedSessionSigningKey` to it on the signed retry.
          example: 04f45f2a22c908b9ce09a7150e514afd24627c401c38a4afc164e1ea783adaaa31d4245acfb88c2ebd42b47628d63ecabf345484f0a9f665b63c54c897d5578be2
    AgentPermission:
      type: string
      enum:
        - VIEW_TRANSACTIONS
        - CREATE_TRANSFERS
        - CREATE_QUOTES
        - EXECUTE_QUOTES
        - MANAGE_EXTERNAL_ACCOUNTS
      description: 'Permission granted to an agent that determines what actions it can perform. VIEW_TRANSACTIONS: Can list and retrieve transactions and account balances. CREATE_TRANSFERS: Can initiate same-currency transfers. CREATE_QUOTES: Can create cross-currency quotes. EXECUTE_QUOTES: Can execute cross-currency quotes. MANAGE_EXTERNAL_ACCOUNTS: Can create and manage external accounts.'
    AgentExecutionMode:
      type: string
      enum:
        - AUTO
        - APPROVAL_REQUIRED
      description: 'Execution mode controlling whether agent actions require human approval. AUTO: The agent can execute actions autonomously without explicit approval. APPROVAL_REQUIRED: All agent actions require explicit human approval before execution.'
    AgentSpendingLimits:
      type: object
      description: Spending limits that cap the agent's transaction amounts and frequency. All amount fields are integers in the smallest unit of the specified currency. When a transaction is denominated in a different currency, Grid converts using the exchange rate at evaluation time.
      required:
        - currency
        - perTransactionLimit
      properties:
        currency:
          type: string
          description: ISO 4217 currency code that all amount limits are denominated in.
          example: USD
        perTransactionLimit:
          type: integer
          description: Maximum amount the agent can transfer in a single transaction.
          example: 50000
        dailyLimit:
          type:
            - integer
            - 'null'
          description: Maximum total amount the agent can transfer per day. Null means no daily limit.
          example: 500000
        dailyTransactionLimit:
          type: integer
          description: Maximum number of transactions the agent can initiate per day.
          example: 10
        monthlyLimit:
          type:
            - integer
            - 'null'
          description: Maximum total amount the agent can transfer per month. Null means no monthly limit.
          example: 5000000
    AgentAccountRule:
      type: object
      description: Per-account policy override that takes precedence over the agent's default policy for a specific account.
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: The internal account ID this rule applies to.
          example: Account:019542f5-b3e7-1d02-0000-000000000001
        executionMode:
          $ref: '#/components/schemas/AgentExecutionMode'
        perTransactionLimit:
          type:
            - integer
            - 'null'
          description: Per-transaction limit override, in the smallest unit of the relevant currency. Null inherits from the agent's spending limits.
          example: 10000
    AgentAccountRestrictions:
      type: object
      description: Optional restrictions that limit the agent to specific accounts or override policy per account.
      properties:
        allowedAccountIds:
          type:
            - array
            - 'null'
          description: If set, restricts the agent to operate only on the specified internal account IDs. Null means the agent can access all accounts.
          items:
            type: string
            example: Account:019542f5-b3e7-1d02-0000-000000000001
        accountRules:
          type: array
          description: Per-account rules that override the agent's default policy for specific accounts.
          items:
            $ref: '#/components/schemas/AgentAccountRule'
    AgentApprovalThresholds:
      type: object
      description: Thresholds that force approval for high-value transactions, overriding the default execution mode. When a transaction is denominated in a different currency than the threshold, Grid converts using the exchange rate at evaluation time.
      properties:
        currency:
          type: string
          description: ISO 4217 currency code that the amount threshold is denominated in. Required when amount is set.
          example: USD
        amount:
          type:
            - integer
            - 'null'
          description: If set, any transaction above this amount (in the smallest unit of the specified currency) will require explicit approval even when the agent's defaultExecutionMode is AUTO. Null means no threshold override.
          example: 100000
    AgentPolicy:
      type: object
      description: Policy governing what an agent can do, how it executes actions, and its spending boundaries.
      required:
        - permissions
        - defaultExecutionMode
        - spendingLimits
      properties:
        permissions:
          type: array
          description: List of permissions granted to the agent.
          items:
            $ref: '#/components/schemas/AgentPermission'
        defaultExecutionMode:
          $ref: '#/components/schemas/AgentExecutionMode'
        spendingLimits:
          $ref: '#/components/schemas/AgentSpendingLimits'
        accountRestrictions:
          $ref: '#/components/schemas/AgentAccountRestrictions'
        approvalThresholds:
          $ref: '#/components/schemas/AgentApprovalThresholds'
    AgentUsage:
      type: object
      description: Real-time counters tracking the agent's spending and transaction activity against its policy limits.
      required:
        - dailyTransactionCount
        - dailySpend
        - monthlySpend
      properties:
        dailyTransactionCount:
          type: integer
          description: Number of transactions initiated by the agent today.
          example: 3
        dailySpend:
          type: integer
          description: Total amount spent by the agent today, in the smallest unit of the policy's `spendingLimits.currency`.
          example: 150000
        dailyResetDate:
          type: string
          format: date
          description: The date when daily usage counters will reset.
          example: '2025-07-22'
        monthlySpend:
          type: integer
          description: Total amount spent by the agent this month, in the smallest unit of the policy's `spendingLimits.currency`.
          example: 750000
        monthlyResetMonth:
          type: string
          description: The year-month (YYYY-MM) when monthly usage counters will reset.
          example: 2025-08
    Agent:
      type: object
      description: A programmatic agent with scoped permissions and a spending policy, used to automate payment workflows.
      required:
        - id
        - name
        - customerId
        - isPaused
        - isConnected
        - policy
        - usage
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: System-generated unique identifier for the agent.
          example: Agent:019542f5-b3e7-1d02-0000-000000000001
        name:
          type: string
          description: Human-readable name for the agent.
          example: Payroll Automation Agent
        customerId:
          type: string
          description: The ID of the customer this agent operates on behalf of.
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        isPaused:
          type: boolean
          description: Whether the agent is currently paused. Paused agents cannot initiate any actions.
          example: false
        isConnected:
          type: boolean
          description: Whether the agent has been installed and connected (i.e., its device code has been redeemed).
          example: true
        policy:
          $ref: '#/components/schemas/AgentPolicy'
        usage:
          $ref: '#/components/schemas/AgentUsage'
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
          example: '2025-07-21T17:32:28Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          example: '2025-07-21T17:32:28Z'
    AgentListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of agents matching the filter criteria.
          items:
            $ref: '#/components/schemas/Agent'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page.
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true).
        totalCount:
          type: integer
          description: Total number of agents matching the criteria (excluding pagination).
    AgentCreateRequest:
      type: object
      required:
        - name
        - customerId
        - policy
      properties:
        name:
          type: string
          description: Human-readable name to identify the agent.
          example: Payroll Automation Agent
        customerId:
          type: string
          description: The ID of the customer this agent will operate on behalf of.
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        policy:
          $ref: '#/components/schemas/AgentPolicy'
    AgentDeviceCode:
      type: object
      required:
        - code
        - agentId
        - expiresAt
        - redeemed
      properties:
        code:
          type: string
          description: Human-readable device code used to install and connect the agent software.
          example: GRID-AGENT-X7K9-M2P4
        agentId:
          type: string
          description: The agent this device code belongs to.
          example: Agent:019542f5-b3e7-1d02-0000-000000000001
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when this device code expires.
          example: '2025-07-22T17:32:28Z'
        redeemed:
          type: boolean
          description: Whether this device code has already been redeemed by the agent.
          example: false
    AgentCreateResponse:
      type: object
      description: Response returned when an agent is created, including the agent and a device code for installation.
      required:
        - agent
        - deviceCode
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        deviceCode:
          $ref: '#/components/schemas/AgentDeviceCode'
    AgentActionStatus:
      type: string
      enum:
        - PENDING_APPROVAL
        - APPROVED
        - REJECTED
        - FAILED
      description: |
        Status of an agent action.

        | Status | Description |
        |--------|-------------|
        | `PENDING_APPROVAL` | Submitted by the agent, awaiting platform approval before execution |
        | `APPROVED` | Approved by the platform; execution is in progress or completed |
        | `REJECTED` | Rejected by the platform; the underlying transaction was not executed |
        | `FAILED` | Approved but execution failed (e.g. quote expired, insufficient funds) |
    AgentActionType:
      type: string
      enum:
        - EXECUTE_QUOTE
        - TRANSFER_OUT
        - TRANSFER_IN
      description: |
        The type of action the agent is requesting.

        | Type | Description |
        |------|-------------|
        | `EXECUTE_QUOTE` | Execute a cross-currency quote |
        | `TRANSFER_OUT` | Transfer from an internal account to an external account |
        | `TRANSFER_IN` | Transfer from an external account to an internal account |
    AgentTransferDetails:
      type: object
      description: Details of a transfer-type agent action (TRANSFER_OUT or TRANSFER_IN).
      required:
        - amount
        - currency
        - sourceAccountId
        - destinationAccountId
      properties:
        amount:
          type: integer
          format: int64
          description: Transfer amount in the smallest unit of the specified currency.
          example: 50000
        currency:
          type: string
          description: ISO 4217 currency code for the transfer amount.
          example: USD
        sourceAccountId:
          type: string
          description: ID of the source account (internal or external).
          example: InternalAccount:a12dcbd6-dced-4ec4-b756-3c3a9ea3d123
        destinationAccountId:
          type: string
          description: ID of the destination account (internal or external).
          example: ExternalAccount:e85dcbd6-dced-4ec4-b756-3c3a9ea3d965
    AgentAction:
      type: object
      description: An action submitted by an agent that may require platform approval before execution. All agent-initiated operations (quote execution, transfers) are represented as AgentActions, giving the platform a consistent object to approve, reject, and audit regardless of the underlying operation type.
      required:
        - id
        - agentId
        - customerId
        - platformCustomerId
        - status
        - type
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: System-generated unique identifier for this action.
          example: AgentAction:019542f5-b3e7-1d02-0000-000000000099
        agentId:
          type: string
          description: The agent that submitted this action.
          example: Agent:019542f5-b3e7-1d02-0000-000000000042
        customerId:
          type: string
          description: The customer on whose behalf the action was submitted.
          example: Customer:019542f5-b3e7-1d02-0000-000000000010
        platformCustomerId:
          type: string
          description: Platform-specific ID of the customer.
          example: user-a1b2c3
        status:
          $ref: '#/components/schemas/AgentActionStatus'
        type:
          $ref: '#/components/schemas/AgentActionType'
        quote:
          allOf:
            - $ref: '#/components/schemas/Quote'
          description: The quote being executed. Populated for `EXECUTE_QUOTE` actions; absent for transfer actions. Contains the full amount, currency, destination, and rate details needed to present an approval decision to the user.
        transferDetails:
          allOf:
            - $ref: '#/components/schemas/AgentTransferDetails'
          description: Details of the transfer being requested. Populated for `TRANSFER_OUT` and `TRANSFER_IN` actions; absent for `EXECUTE_QUOTE` actions.
        transaction:
          allOf:
            - $ref: '#/components/schemas/TransactionOneOf'
          description: The resulting transaction, populated once the action has been approved and execution has begun. Absent while the action is `PENDING_APPROVAL` or `REJECTED`.
        rejectionReason:
          type: string
          description: Human-readable reason provided by the platform when rejecting the action. Only present when status is `REJECTED`.
          example: Transaction amount exceeds customer's current risk limit.
        createdAt:
          type: string
          format: date-time
          description: When the action was submitted by the agent.
          example: '2025-10-03T15:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When the action was last updated.
          example: '2025-10-03T15:02:00Z'
    AgentActionListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of agent actions matching the filter criteria.
          items:
            $ref: '#/components/schemas/AgentAction'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page.
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true).
        totalCount:
          type: integer
          description: Total number of actions matching the criteria (excluding pagination).
    AgentUpdateRequest:
      type: object
      description: Partial update to an agent's basic fields. At least one field must be provided.
      properties:
        name:
          type: string
          description: Updated name for the agent.
          example: Updated Payroll Agent
        isPaused:
          type: boolean
          description: Set to true to pause the agent or false to resume it.
          example: true
    AgentSpendingLimitsUpdate:
      type: object
      description: Partial update to spending limits. Only provided fields will be updated; omitted fields retain their current values.
      properties:
        currency:
          type: string
          description: ISO 4217 currency code that all amount limits are denominated in. Updating this recasts all existing limits into the new currency denomination.
          example: USD
        perTransactionLimit:
          type: integer
          description: Maximum amount per transaction.
          example: 50000
        dailyLimit:
          type:
            - integer
            - 'null'
          description: Maximum daily spend. Set to null to remove the daily limit.
          example: 500000
        dailyTransactionLimit:
          type: integer
          description: Maximum number of transactions per day.
          example: 10
        monthlyLimit:
          type:
            - integer
            - 'null'
          description: Maximum monthly spend. Set to null to remove the monthly limit.
          example: 5000000
    AgentPolicyUpdateRequest:
      type: object
      description: Partial update to an agent's policy. Only provided fields will be updated; omitted fields retain their current values.
      properties:
        permissions:
          type: array
          description: Updated list of permissions. Replaces the entire permissions list when provided.
          items:
            $ref: '#/components/schemas/AgentPermission'
        defaultExecutionMode:
          $ref: '#/components/schemas/AgentExecutionMode'
        spendingLimits:
          $ref: '#/components/schemas/AgentSpendingLimitsUpdate'
        accountRestrictions:
          $ref: '#/components/schemas/AgentAccountRestrictions'
        approvalThresholds:
          $ref: '#/components/schemas/AgentApprovalThresholds'
    AgentActionRejectRequest:
      type: object
      properties:
        reason:
          type: string
          description: Optional human-readable reason for the rejection, stored on the action and visible to the platform.
          example: Transaction amount exceeds customer's current risk limit.
    AgentDeviceCodeStatusResponse:
      type: object
      required:
        - code
        - redeemed
      properties:
        code:
          type: string
          description: The device code.
          example: GRID-AGENT-X7K9-M2P4
        redeemed:
          type: boolean
          description: Whether this device code has been redeemed.
          example: false
    AgentDeviceCodeRedeemResponse:
      type: object
      required:
        - agentId
        - agentName
        - accessToken
        - policy
      properties:
        agentId:
          type: string
          description: The agent's system-generated ID.
          example: Agent:019542f5-b3e7-1d02-0000-000000000001
        agentName:
          type: string
          description: The agent's name.
          example: Payroll Automation Agent
        accessToken:
          type: string
          description: 'Bearer token used to authenticate all subsequent API calls as this agent. Pass as `Authorization: Bearer <accessToken>`. This token is returned only once and must be stored securely — it cannot be retrieved again.'
          example: gat_ed0ad25881e234cc28fb2dec0a4fe64e4172a3b9
        policy:
          $ref: '#/components/schemas/AgentPolicy'
    CardState:
      type: string
      enum:
        - PENDING_KYC
        - PENDING_ISSUE
        - ACTIVE
        - FROZEN
        - CLOSED
      description: |
        Lifecycle state of a card.

        | State | Description |
        |-------|-------------|
        | `PENDING_KYC` | The cardholder has not yet completed KYC. Cards in this state cannot transact. |
        | `PENDING_ISSUE` | The card has been requested and is being provisioned with the issuer. |
        | `ACTIVE` | The card is live and can authorize transactions. |
        | `FROZEN` | The card is temporarily disabled by the platform. New authorizations are declined with `CARD_PAUSED`. Existing settlements and refunds continue to reconcile. |
        | `CLOSED` | The card is permanently closed. Terminal, irreversible state. |
    CardStateReason:
      type: string
      enum:
        - ISSUER_REJECTED
        - CLOSED_BY_PLATFORM
        - CLOSED_BY_GRID
      description: |
        Reason a card reached a terminal or non-active state. Present on
        `CLOSED` cards, and on cards that fail provisioning before reaching
        `ACTIVE`.

        | Reason | Description |
        |--------|-------------|
        | `ISSUER_REJECTED` | The card issuer rejected provisioning during `PENDING_ISSUE`. |
        | `CLOSED_BY_PLATFORM` | The card was closed via `PATCH /cards/{id}` (`state: CLOSED`) by the platform. |
        | `CLOSED_BY_GRID` | The card was closed by Grid (e.g. compliance or risk action). |
    CardBrand:
      type: string
      enum:
        - VISA
        - MASTERCARD
      description: |
        Card network brand. Read-only — determined by Grid when the card is
        provisioned with the issuer.
    CardForm:
      type: string
      enum:
        - VIRTUAL
      description: |
        Physical form factor of the card. Only `VIRTUAL` is supported in v1;
        `PHYSICAL` will be added in a later release.
    Card:
      type: object
      required:
        - id
        - cardholderId
        - state
        - form
        - fundingSources
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: System-generated unique card identifier
          readOnly: true
          example: Card:019542f5-b3e7-1d02-0000-000000000010
        cardholderId:
          type: string
          description: The id of the `Customer` who holds this card.
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        platformCardId:
          type: string
          description: Platform-specific card identifier. Optional on create — system-generated if omitted, mirroring `platformCustomerId` semantics.
          example: card-emp-aary-001
        state:
          $ref: '#/components/schemas/CardState'
        stateReason:
          anyOf:
            - $ref: '#/components/schemas/CardStateReason'
            - type: 'null'
          description: Reason associated with the current `state`. Populated when the card is `CLOSED` or when provisioning was rejected; otherwise null.
        brand:
          $ref: '#/components/schemas/CardBrand'
        form:
          $ref: '#/components/schemas/CardForm'
        last4:
          type: string
          description: Last four digits of the card PAN.
          example: '4242'
        expMonth:
          type: integer
          minimum: 1
          maximum: 12
          description: Card expiration month (1–12).
          example: 12
        expYear:
          type: integer
          description: Card expiration year (four digits).
          example: 2029
        panEmbedUrl:
          type: string
          format: uri
          description: URL of the card issuer's iframe that securely displays the PAN, CVV, and expiry to the cardholder. The full PAN and CVV never cross Grid's servers — render this URL in an iframe in your client to reveal card details.
          example: https://embed.lithic.com/iframe/...?t=...
        fundingSources:
          type: array
          description: Internal account ids bound to this card as funding sources, in priority order — the first entry is tried first by Authorization Decisioning. Every card has at least one funding source.
          items:
            type: string
          example:
            - InternalAccount:019542f5-b3e7-1d02-0000-000000000002
            - InternalAccount:019542f5-b3e7-1d02-0000-000000000003
        currency:
          type: string
          description: Currency the card transacts in (ISO 4217 for fiat, tickers for crypto). Derived from the funding sources at issue time — all funding sources bound to a card must be denominated in the same card-eligible currency.
          example: USD
          readOnly: true
        issuerRef:
          type: string
          description: Opaque identifier for the card on the underlying issuer. Useful for cross-referencing in issuer dashboards; not used for any Grid request routing.
          example: lithic_card_4f8d3a2b1c
          readOnly: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          readOnly: true
          example: '2026-05-08T14:10:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          readOnly: true
          example: '2026-05-08T14:11:00Z'
    CardListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of cards matching the filter criteria
          items:
            $ref: '#/components/schemas/Card'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true)
        totalCount:
          type: integer
          description: Total number of cards matching the criteria (excluding pagination)
    CardCreateRequest:
      type: object
      required:
        - cardholderId
        - form
        - fundingSources
      properties:
        cardholderId:
          type: string
          description: The id of the `Customer` to issue the card to. The customer must have KYC status `APPROVED`; otherwise the request is rejected with `CARDHOLDER_KYC_NOT_APPROVED`.
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        platformCardId:
          type: string
          description: Optional platform-specific card identifier. System-generated when omitted, mirroring `platformCustomerId` semantics.
          example: card-emp-aary-001
        form:
          $ref: '#/components/schemas/CardForm'
        fundingSources:
          type: array
          description: Internal account ids to bind as funding sources, in priority order. The first entry is tried first by Authorization Decisioning. Every card must be bound to at least one source, and every source must belong to the cardholder and be denominated in a card-eligible currency (USDB in v1); otherwise the request is rejected with `FUNDING_SOURCE_INELIGIBLE`.
          minItems: 1
          items:
            type: string
          example:
            - InternalAccount:019542f5-b3e7-1d02-0000-000000000002
    CardUpdateRequest:
      type: object
      description: Update request for `PATCH /cards/{id}`. At least one of `state` or `fundingSources` must be supplied. `state` transitions are limited to `ACTIVE ⇄ FROZEN` and `ACTIVE | FROZEN → CLOSED`; any other transition returns `409 INVALID_STATE_TRANSITION`. `CLOSED` is terminal and irreversible and cannot be combined with `fundingSources`. `fundingSources`, when supplied, fully replaces the card's bound funding sources — the array order determines the priority Authorization Decisioning tries them in.
      properties:
        state:
          type: string
          enum:
            - ACTIVE
            - FROZEN
            - CLOSED
          description: Target state for the card. Permitted transitions are `ACTIVE ⇄ FROZEN` and `ACTIVE | FROZEN → CLOSED`. `CLOSED` is terminal and irreversible; once closed, the card stays in the system for audit and reconciliation but cannot transact again.
          example: FROZEN
        fundingSources:
          type: array
          description: 'New ordered list of internal account ids to bind as funding sources. Fully replaces the previous binding. Each id must belong to the cardholder and be denominated in the card''s currency. The list must contain at least one source — to stop a card from spending without removing all sources, transition it to `FROZEN` instead. Cannot be supplied alongside `state: CLOSED`.'
          minItems: 1
          items:
            type: string
          example:
            - InternalAccount:019542f5-b3e7-1d02-0000-000000000002
            - InternalAccount:019542f5-b3e7-1d02-0000-000000000003
    CardMerchant:
      type: object
      required:
        - descriptor
      properties:
        descriptor:
          type: string
          description: Merchant descriptor string captured from the card network at authorization time.
          example: BLUE BOTTLE COFFEE SF
        mcc:
          type: string
          description: Merchant Category Code (ISO 18245) — four-digit numeric string.
          example: '5814'
        country:
          type: string
          description: Two-letter ISO 3166-1 alpha-2 country code of the merchant.
          example: US
    SandboxCardAuthorizationRequest:
      type: object
      required:
        - amount
        - currency
        - merchant
      description: Sandbox-only request body for `POST /sandbox/cards/{id}/simulate/authorization`. Drives the same internal authorization + reconcile paths that the issuer would call in production. The decisioning outcome is controlled by the last three characters of `merchant.descriptor` — see the endpoint documentation for the suffix table.
      properties:
        amount:
          type: integer
          format: int64
          description: Authorization amount in the smallest unit of `currency` (e.g. cents for USD).
          exclusiveMinimum: 0
          example: 1250
        currency:
          $ref: '#/components/schemas/Currency'
        merchant:
          $ref: '#/components/schemas/CardMerchant'
    CardTransactionStatus:
      type: string
      enum:
        - AUTHORIZED
        - PARTIALLY_SETTLED
        - SETTLED
        - REFUNDED
        - EXCEPTION
      description: |
        Lifecycle status of a card transaction.

        | Status | Description |
        |--------|-------------|
        | `AUTHORIZED` | The auth has been approved and a hold placed on the funding source; no clearing has arrived yet. |
        | `PARTIALLY_SETTLED` | At least one clearing has arrived and posted, but more clearings are still expected (split shipments, tips, multi-leg trips). |
        | `SETTLED` | All clearings for the auth have posted and the transaction is closed against the funding source. |
        | `REFUNDED` | A `RETURN` was received from the merchant; the net settled amount has been refunded in part or whole. |
        | `EXCEPTION` | The transaction settled to the card network but the corresponding pull from the funding source failed (e.g. balance no longer covers the post-hoc clearing). Surfaces high-urgency alerts and is the dashboard query for stuck reconciliations. |
    CardPullSummary:
      type: object
      required:
        - count
        - totalAmount
      properties:
        count:
          type: integer
          description: Total number of pulls (debits) executed against the funding source for this transaction. `> 1` indicates one or more post-hoc pulls — e.g. restaurant tip / over-auth clearings.
          example: 2
        totalAmount:
          type: integer
          format: int64
          description: Sum of all pull amounts in the smallest unit of the funding source's currency.
          example: 1500
        pendingCount:
          type: integer
          description: Number of pulls still in the `PENDING` state. Drops to zero when every pull has reached a terminal state. Non-zero values that persist beyond the expected settlement window are an early signal for the `EXCEPTION` path.
          example: 0
    CardRefundSummary:
      type: object
      required:
        - count
        - totalAmount
      properties:
        count:
          type: integer
          description: Number of refund (return) events received for this transaction.
          example: 0
        totalAmount:
          type: integer
          format: int64
          description: Sum of all refund amounts in the smallest unit of the funding source's currency.
          example: 0
    CardSettlementSummary:
      type: object
      required:
        - count
        - totalAmount
      properties:
        count:
          type: integer
          description: Number of settlement (clearing) events received for this transaction.
          example: 1
        totalAmount:
          type: integer
          format: int64
          description: Sum of all settled amounts in the smallest unit of the funding source's currency.
          example: 1500
    CardTransaction:
      type: object
      required:
        - id
        - cardId
        - status
        - merchant
        - authorizedAmount
        - accountId
        - pullSummary
        - refundSummary
        - settlementSummary
        - authorizedAt
        - createdAt
        - updatedAt
      description: Parent transaction row for a card authorization and all of the pulls / settlements / refunds that reconcile against it. Child events are rolled up into the `pullSummary`, `refundSummary`, and `settlementSummary` aggregates. Delivered as the payload of the generic transaction webhook stream (extends the Transaction model with a card destination type) on every transition.
      properties:
        id:
          type: string
          description: System-generated unique card transaction identifier
          readOnly: true
          example: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
        cardId:
          type: string
          description: The id of the `Card` this transaction was made on.
          example: Card:019542f5-b3e7-1d02-0000-000000000010
        issuerTransactionToken:
          type: string
          description: Opaque identifier for the transaction on the underlying issuer. Used to cross-reference Grid records against issuer dashboards and webhooks.
          example: lithic_txn_b81c2a4f
          readOnly: true
        status:
          $ref: '#/components/schemas/CardTransactionStatus'
        merchant:
          $ref: '#/components/schemas/CardMerchant'
        authorizedAmount:
          $ref: '#/components/schemas/CurrencyAmount'
        settledAmount:
          $ref: '#/components/schemas/CurrencyAmount'
        refundedAmount:
          $ref: '#/components/schemas/CurrencyAmount'
        accountId:
          type: string
          description: Internal account id that funded this transaction (the funding source selected by Authorization Decisioning at auth time).
          example: InternalAccount:019542f5-b3e7-1d02-0000-000000000002
        pullSummary:
          $ref: '#/components/schemas/CardPullSummary'
        refundSummary:
          $ref: '#/components/schemas/CardRefundSummary'
        settlementSummary:
          $ref: '#/components/schemas/CardSettlementSummary'
        authorizedAt:
          type: string
          format: date-time
          description: When the auth was approved.
          example: '2026-05-08T14:30:00Z'
        lastEventAt:
          type: string
          format: date-time
          description: Timestamp of the most recent reconcile event (pull / clearing / refund) against this transaction.
          example: '2026-05-08T15:42:11Z'
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (same as `authorizedAt` for card transactions).
          readOnly: true
          example: '2026-05-08T14:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.
          readOnly: true
          example: '2026-05-08T15:42:11Z'
    SandboxCardClearingRequest:
      type: object
      required:
        - cardTransactionId
        - amount
      description: Sandbox-only request body for `POST /sandbox/cards/{id}/simulate/clearing`. Drives a clearing event against an existing `CardTransaction`. Pass an `amount` greater than the authorized amount to exercise the over-auth / restaurant-tip post-hoc-pull path; pass `0` to exercise `AUTHORIZATION_EXPIRY`. Suffix-driven outcomes on the parent transaction's id govern whether the post-hoc pull succeeds.
      properties:
        cardTransactionId:
          type: string
          description: The id of the `CardTransaction` to clear against. Must be in `AUTHORIZED` or `PARTIALLY_SETTLED` state.
          example: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
        amount:
          type: integer
          format: int64
          description: Clearing amount in the smallest unit of the transaction's currency. Set to `0` to simulate an authorization expiry with no clearing.
          minimum: 0
          example: 1500
    SandboxCardReturnRequest:
      type: object
      required:
        - cardTransactionId
        - amount
      description: Sandbox-only request body for `POST /sandbox/cards/{id}/simulate/return`. Drives a `RETURN` event against an existing settled `CardTransaction`, which creates a `CardRefund` and pushes the parent transaction towards `REFUNDED` (full) or keeps it `SETTLED` (partial).
      properties:
        cardTransactionId:
          type: string
          description: The id of the `CardTransaction` to refund against. Must have at least one settled clearing.
          example: CardTransaction:019542f5-b3e7-1d02-0000-000000000100
        amount:
          type: integer
          format: int64
          description: Return amount in the smallest unit of the transaction's currency. Must be less than or equal to the net settled amount (settled minus previously-refunded).
          exclusiveMinimum: 0
          example: 1500
    WebhookType:
      type: string
      enum:
        - OUTGOING_PAYMENT.PENDING
        - OUTGOING_PAYMENT.PROCESSING
        - OUTGOING_PAYMENT.COMPLETED
        - OUTGOING_PAYMENT.FAILED
        - OUTGOING_PAYMENT.EXPIRED
        - OUTGOING_PAYMENT.REFUND_PENDING
        - OUTGOING_PAYMENT.REFUND_COMPLETED
        - OUTGOING_PAYMENT.REFUND_FAILED
        - INCOMING_PAYMENT.PENDING
        - INCOMING_PAYMENT.COMPLETED
        - INCOMING_PAYMENT.FAILED
        - CUSTOMER.KYC_APPROVED
        - CUSTOMER.KYC_REJECTED
        - CUSTOMER.KYC_PENDING
        - CUSTOMER.KYB_APPROVED
        - CUSTOMER.KYB_REJECTED
        - CUSTOMER.KYB_PENDING
        - VERIFICATION.APPROVED
        - VERIFICATION.REJECTED
        - VERIFICATION.RESOLVE_ERRORS
        - VERIFICATION.IN_PROGRESS
        - VERIFICATION.PENDING_MANUAL_REVIEW
        - VERIFICATION.READY_FOR_VERIFICATION
        - INTERNAL_ACCOUNT.BALANCE_UPDATED
        - INTERNAL_ACCOUNT.STATUS_UPDATED
        - INVITATION.CLAIMED
        - BULK_UPLOAD.COMPLETED
        - BULK_UPLOAD.FAILED
        - AGENT_ACTION.PENDING_APPROVAL
        - CARD.STATE_CHANGE
        - CARD.FUNDING_SOURCE_CHANGE
        - TEST
      description: Type of webhook event in OBJECT.EVENT dot-notation. The part before the dot identifies the resource, the part after identifies the event. This lets consumers route purely on type without inspecting data.status.
    BaseWebhook:
      type: object
      required:
        - timestamp
        - id
        - type
      properties:
        id:
          type: string
          description: Unique identifier for this webhook delivery (can be used for idempotency)
          example: Webhook:019542f5-b3e7-1d02-0000-000000000007
        type:
          $ref: '#/components/schemas/WebhookType'
          description: Status-specific event type in OBJECT.EVENT dot-notation (e.g., OUTGOING_PAYMENT.COMPLETED)
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the webhook was sent
          example: '2025-08-15T14:32:00Z'
    AgentActionWebhook:
      allOf:
        - $ref: '#/components/schemas/BaseWebhook'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/AgentAction'
            type:
              type: string
              enum:
                - AGENT_ACTION.PENDING_APPROVAL
    IncomingPaymentWebhookData:
      title: Incoming Payment Webhook Data
      allOf:
        - $ref: '#/components/schemas/IncomingTransaction'
        - type: object
          properties:
            requestedReceiverCustomerInfoFields:
              type: array
              items:
                $ref: '#/components/schemas/CounterpartyFieldDefinition'
              description: Information required by the sender's VASP about the recipient. Platform must provide these in the 200 OK response if approving. Note that this only includes fields which Grid does not already have from initial customer registration.
    IncomingPaymentWebhook:
      allOf:
        - $ref: '#/components/schemas/BaseWebhook'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/IncomingPaymentWebhookData'
            type:
              type: string
              enum:
                - INCOMING_PAYMENT.PENDING
                - INCOMING_PAYMENT.COMPLETED
                - INCOMING_PAYMENT.FAILED
    IncomingPaymentWebhookResponse:
      type: object
      properties:
        receiverCustomerInfo:
          type: object
          additionalProperties: true
          description: Information about the recipient, provided by the platform if requested in the webhook via `requestedReceiverCustomerInfoFields` and the payment is approved.
    IncomingPaymentWebhookForbiddenResponse:
      allOf:
        - $ref: '#/components/schemas/GridError'
        - type: object
          properties:
            reason:
              type: string
              description: Optional reason for rejecting the payment. This is just for debugging purposes or can be used for a platform's own purposes.
              example: RESTRICTED_JURISDICTION
    IncomingPaymentWebhookUnprocessableResponse:
      allOf:
        - $ref: '#/components/schemas/GridError'
        - type: object
          properties:
            requiredFields:
              type: array
              items:
                type: string
              description: List of fields that are required by the platform, but are not present in the counterparty information.
              example:
                - TAX_ID
                - REGISTRATION_NUMBER
    OutgoingPaymentWebhook:
      allOf:
        - $ref: '#/components/schemas/BaseWebhook'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/OutgoingTransaction'
            type:
