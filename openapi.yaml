    DocumentType:
      type: string
      enum:
        - PASSPORT
        - DRIVERS_LICENSE
        - NATIONAL_ID
        - PROOF_OF_ADDRESS
        - BANK_STATEMENT
        - TAX_RETURN
        - CERTIFICATE_OF_INCORPORATION
        - ARTICLES_OF_INCORPORATION
        - ARTICLES_OF_ASSOCIATION
        - STATE_REGISTRY_EXCERPT
        - GOOD_STANDING_CERTIFICATE
        - INFORMATION_STATEMENT
        - INCUMBENCY_CERTIFICATE
        - BUSINESS_LICENSE
        - SHAREHOLDER_REGISTER
        - POWER_OF_ATTORNEY
        - UTILITY_BILL
        - ELECTRICITY_BILL
        - RENT_OR_LEASE_AGREEMENT
        - DIRECTOR_REGISTRY
        - TRUST_AGREEMENT
        - STATE_COMPANY_REGISTRY
        - PARTNERSHIP_CONTROL_AGREEMENT
        - PARTNERSHIP_AGREEMENT
        - SELFIE
        - OTHER
      description: |-
        Type of identity or business verification document. Document types are grouped by verification category:
        **Identity** — PASSPORT, DRIVERS_LICENSE, NATIONAL_ID
        **Business — Legal presence** — CERTIFICATE_OF_INCORPORATION, ARTICLES_OF_INCORPORATION, ARTICLES_OF_ASSOCIATION, STATE_REGISTRY_EXCERPT
        **Business — Control structure** — DIRECTOR_REGISTRY, TRUST_AGREEMENT, STATE_COMPANY_REGISTRY, PARTNERSHIP_CONTROL_AGREEMENT
        **Business — Ownership structure** — SHAREHOLDER_REGISTER, TRUST_AGREEMENT, PARTNERSHIP_AGREEMENT
        **Proof of address** — UTILITY_BILL, RENT_OR_LEASE_AGREEMENT, ELECTRICITY_BILL, BANK_STATEMENT, TAX_RETURN
      example: PASSPORT
    Document:
      type: object
      required:
        - id
        - documentHolder
        - documentType
        - country
        - fileName
        - createdAt
      properties:
        id:
          type: string
          description: Unique identifier for this document
          example: Document:019542f5-b3e7-1d02-0000-000000000001
        documentHolder:
          type: string
          description: ID of the entity that owns this document. Can be a Customer ID or a BeneficialOwner ID.
          example: BeneficialOwner:019542f5-b3e7-1d02-0000-000000000001
        documentType:
          $ref: '#/components/schemas/DocumentType'
        side:
          type: string
          enum:
            - FRONT
            - BACK
          description: Which side of the document this upload represents. Relevant for two-sided documents like driver's licenses or national IDs.
          example: FRONT
        country:
          type: string
          description: Country that issued the document (ISO 3166-1 alpha-2)
          example: US
        documentNumber:
          type: string
          description: Document identification number (e.g., passport number)
          example: A12345678
        issuingAuthority:
          type: string
          description: Name of the government agency or organization that issued the document
          example: U.S. Department of State
        fileName:
          type: string
          description: Original file name of the uploaded document
          example: passport_scan.pdf
        createdAt:
          type: string
          format: date-time
          description: When this document was uploaded
          example: '2025-10-03T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When this document was last updated
          example: '2025-10-03T12:00:00Z'
    DocumentListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of documents matching the filter criteria
          items:
            $ref: '#/components/schemas/Document'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true)
        totalCount:
          type: integer
          description: Total number of results matching the criteria
    BaseDocumentRequest:
      type: object
      required:
        - file
        - documentType
        - country
      properties:
        file:
          type: string
          format: binary
          description: The document file (PDF, JPEG, or PNG, max 10 MB)
        documentType:
          $ref: '#/components/schemas/DocumentType'
        side:
          type: string
          enum:
            - FRONT
            - BACK
          description: Which side of the document (for two-sided documents like driver's licenses)
          example: FRONT
        country:
          type: string
          description: Country that issued the document (ISO 3166-1 alpha-2)
          example: US
        documentNumber:
          type: string
          description: Document identification number (e.g., passport number)
          example: A12345678
        issuingAuthority:
          type: string
          description: Name of the government agency or organization that issued the document
          example: U.S. Department of State
    DocumentUploadRequest:
      title: Document Upload Request
      allOf:
        - $ref: '#/components/schemas/BaseDocumentRequest'
        - type: object
          required:
            - documentHolder
          properties:
            documentHolder:
              type: string
              description: ID of the entity that owns this document. Can be a Customer ID or a BeneficialOwner ID.
              example: BeneficialOwner:019542f5-b3e7-1d02-0000-000000000001
    DocumentReplaceRequest:
      title: Document Replace Request
      allOf:
        - $ref: '#/components/schemas/BaseDocumentRequest'
    VerificationStatus:
      type: string
      enum:
        - RESOLVE_ERRORS
        - PENDING_MANUAL_REVIEW
        - IN_PROGRESS
        - APPROVED
        - REJECTED
        - READY_FOR_VERIFICATION
      description: Current status of the KYC/KYB verification
      example: RESOLVE_ERRORS
    VerificationErrorType:
      type: string
      enum:
        - MISSING_FIELD
        - INVALID_FIELD
        - MISSING_LEGAL_PRESENCE_DOCUMENT
        - MISSING_CONTROL_STRUCTURE_DOCUMENT
        - MISSING_OWNERSHIP_STRUCTURE_DOCUMENT
        - MISSING_PROOF_OF_ADDRESS_DOCUMENT
        - MISSING_IDENTITY_DOCUMENT
        - INVALID_DOCUMENT
        - EXPIRED_DOCUMENT
        - POOR_QUALITY_DOCUMENT
        - SUSPECTED_FRAUD_DOCUMENT
        - WRONG_DOCUMENT_TYPE
        - INCOMPLETE_DOCUMENT
        - UNREADABLE_DOCUMENT
        - DOCUMENT_VERIFICATION_FAILED
        - APPLICANT_SANCTIONED
        - APPLICANT_FRAUD
        - APPLICANT_CRIMINAL_RECORD
        - APPLICANT_REJECTED
        - MISSING_BENEFICIAL_OWNER
      description: Type of verification error. The category-specific MISSING_*_DOCUMENT types indicate which document category is needed. Document quality types (POOR_QUALITY_DOCUMENT, SUSPECTED_FRAUD_DOCUMENT, etc.) indicate specific issues with uploaded documents. APPLICANT_* types indicate issues with the applicant themselves (sanctions, fraud, criminal records).
      example: MISSING_FIELD
    VerificationError:
      type: object
      required:
        - resourceId
        - type
        - reason
      properties:
        resourceId:
          type: string
          description: ID of the resource with the issue (Customer, BeneficialOwner, or Document)
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        type:
          $ref: '#/components/schemas/VerificationErrorType'
        field:
          type: string
          description: Dot-notation path to the field with the issue. Present when type is MISSING_FIELD or INVALID_FIELD.
          example: customer.address.line1
        acceptedDocumentTypes:
          type: array
          items:
            $ref: '#/components/schemas/DocumentType'
          description: |-
            Document types that would satisfy this requirement. The integrator can upload any one of the listed types. Present when type is MISSING_LEGAL_PRESENCE_DOCUMENT, MISSING_CONTROL_STRUCTURE_DOCUMENT, MISSING_OWNERSHIP_STRUCTURE_DOCUMENT, MISSING_PROOF_OF_ADDRESS_DOCUMENT, MISSING_IDENTITY_DOCUMENT, INVALID_DOCUMENT, or EXPIRED_DOCUMENT.

            | Error Type | Accepted Document Types |
            |---|---|
            | MISSING_LEGAL_PRESENCE_DOCUMENT | CERTIFICATE_OF_INCORPORATION, ARTICLES_OF_INCORPORATION, ARTICLES_OF_ASSOCIATION, STATE_REGISTRY_EXCERPT |
            | MISSING_CONTROL_STRUCTURE_DOCUMENT | DIRECTOR_REGISTRY, TRUST_AGREEMENT, STATE_COMPANY_REGISTRY, PARTNERSHIP_CONTROL_AGREEMENT |
            | MISSING_OWNERSHIP_STRUCTURE_DOCUMENT | SHAREHOLDER_REGISTER, TRUST_AGREEMENT, PARTNERSHIP_AGREEMENT |
            | MISSING_PROOF_OF_ADDRESS_DOCUMENT | UTILITY_BILL, RENT_OR_LEASE_AGREEMENT, ELECTRICITY_BILL, BANK_STATEMENT, TAX_RETURN |
            | MISSING_IDENTITY_DOCUMENT | PASSPORT, DRIVERS_LICENSE, NATIONAL_ID |
        reason:
          type: string
          description: Human-readable description of the issue
          example: Business address line 1 is required
    Verification:
      type: object
      required:
        - id
        - customerId
        - verificationStatus
        - errors
        - createdAt
      properties:
        id:
          type: string
          description: Unique identifier for this verification
          example: Verification:019542f5-b3e7-1d02-0000-000000000001
        customerId:
          type: string
          description: The ID of the customer being verified
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
        verificationStatus:
          $ref: '#/components/schemas/VerificationStatus'
        errors:
          type: array
          description: List of issues preventing verification from proceeding. Empty when verificationStatus is APPROVED or IN_PROGRESS.
          items:
            $ref: '#/components/schemas/VerificationError'
        createdAt:
          type: string
          format: date-time
          description: When this verification was created
          example: '2025-10-03T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When this verification was last updated
          example: '2025-10-03T12:00:00Z'
    VerificationListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          description: List of verifications matching the filter criteria
          items:
            $ref: '#/components/schemas/Verification'
        hasMore:
          type: boolean
          description: Indicates if more results are available beyond this page
        nextCursor:
          type: string
          description: Cursor to retrieve the next page of results (only present if hasMore is true)
        totalCount:
          type: integer
          description: Total number of results matching the criteria
    VerificationRequest:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: string
          description: The ID of the customer to verify
          example: Customer:019542f5-b3e7-1d02-0000-000000000001
    ExternalAccountReference:
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: Reference to an external account ID
          example: ExternalAccount:e85dcbd6-dced-4ec4-b756-3c3a9ea3d965
    InternalAccountReference:
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: Reference to an internal account ID
          example: InternalAccount:a12dcbd6-dced-4ec4-b756-3c3a9ea3d123
    TransferInRequest:
      type: object
      required:
        - source
        - destination
      properties:
        source:
          $ref: '#/components/schemas/ExternalAccountReference'
          description: Source external account details
        destination:
          $ref: '#/components/schemas/InternalAccountReference'
          description: Destination internal account details
        amount:
          type: integer
          format: int64
          description: Amount in the smallest unit of the currency (e.g., cents for USD/EUR, satoshis for BTC)
          example: 12550
    TransactionStatus:
      type: string
      enum:
        - CREATED
        - PENDING
        - PROCESSING
        - COMPLETED
        - REJECTED
        - FAILED
        - REFUNDED
        - EXPIRED
      description: |
        Status of a payment transaction.

        | Status | Description |
        |--------|-------------|
        | `CREATED` | Initial lookup has been created |
        | `PENDING` | Quote has been created |
        | `PROCESSING` | Funding has been received and payment initiated |
        | `COMPLETED` | Cross border payment has been received, converted and payment has been sent to the offramp network |
        | `REJECTED` | Receiving institution or wallet rejected payment, payment has been refunded |
        | `FAILED` | An error occurred during payment |
        | `REFUNDED` | Payment was unable to complete and refunded |
        | `EXPIRED` | Quote has expired |
    TransactionDestinationType:
      type: string
      enum:
        - ACCOUNT
        - UMA_ADDRESS
      description: Type of transaction destination
      example: ACCOUNT
    BaseTransactionDestination:
      type: object
      required:
        - destinationType
      properties:
        destinationType:
          $ref: '#/components/schemas/TransactionDestinationType'
        currency:
          type: string
          description: Currency code for the destination
          example: EUR
    AccountTransactionDestination:
      title: Account Destination
      allOf:
        - $ref: '#/components/schemas/BaseTransactionDestination'
        - type: object
          required:
